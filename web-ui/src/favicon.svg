<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="7" fill="#0d6efd"/>

  <!-- Outer faint ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- 4 outer nodes -->
  <circle cx="16" cy="5"  r="2.4" fill="white"/>
  <circle cx="27" cy="16" r="2.4" fill="white"/>
  <circle cx="16" cy="27" r="2.4" fill="white"/>
  <circle cx="5"  cy="16" r="2.4" fill="white"/>

  <!-- Center core -->
  <circle cx="16" cy="16" r="3.5" fill="white"/>

  <!-- Spokes from center to outer nodes -->
  <line x1="16" y1="12.5" x2="16" y2="7.4"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.5" y1="16" x2="24.6" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="19.5" x2="16" y2="24.6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12.5" y1="16" x2="7.4" y2="16"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
