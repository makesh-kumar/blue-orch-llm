<!-- ── Workspace Bar ──────────────────────────────────────────────────────── -->
<div class="workspace-bar d-flex align-items-center gap-2 px-3 py-2">

  <i class="bi bi-folder2-open text-primary flex-shrink-0"></i>
  <span class="workspace-label text-muted small fw-semibold flex-shrink-0">Workspace</span>

  <input
    class="form-control form-control-sm workspace-input font-monospace"
    [class.text-muted]="(workspaceService.contextFiles$ | async)?.length"
    type="text"
    [value]="pathInput"
    (input)="pathInput = $any($event.target).value"
    (keydown)="onPathKeydown($event)"
    (blur)="applyPathInput()"
    title="Active workspace path (press Enter to apply)"
    spellcheck="false">

  <!-- Context files badge: replaces folder hint when specific files are in context -->
  <span *ngIf="(workspaceService.contextFiles$ | async)?.length as fileCount"
        class="badge bg-success flex-shrink-0 d-flex align-items-center gap-1"
        title="AI context is scoped to these specific files">
    <i class="bi bi-file-earmark-check"></i>{{ fileCount }} file{{ fileCount === 1 ? '' : 's' }}
  </span>
  <button *ngIf="(workspaceService.contextFiles$ | async)?.length"
          class="btn btn-sm btn-outline-danger flex-shrink-0 py-0 px-2"
          (click)="resetContext()"
          title="Reset context — revert to full workspace folder">
    <i class="bi bi-x-circle"></i>
  </button>

  <button
    class="btn btn-sm btn-outline-primary flex-shrink-0"
    (click)="openBrowser()"
    title="Open file explorer">
    <i class="bi bi-folder-tree me-1"></i>Explore
  </button>

</div>

<!-- ── File Explorer Overlay ─────────────────────────────────────────────── -->
<div *ngIf="showBrowser" class="browser-backdrop" (click)="closeBrowser()"></div>

<div *ngIf="showBrowser" class="browser-panel shadow-lg">

  <!-- Header -->
  <div class="browser-header d-flex align-items-center gap-2 px-3 py-2 border-bottom bg-primary text-white">
    <button class="btn btn-sm btn-outline-light py-0 px-2 flex-shrink-0"
            (click)="navigateToParent()"
            [disabled]="browserRootPath === '/' || browserLoading"
            title="Go up to parent folder">
      <i class="bi bi-arrow-up"></i>
    </button>
    <i class="bi bi-folder-tree flex-shrink-0"></i>
    <span class="fw-semibold small flex-1 text-truncate font-monospace" [title]="browserRootPath">
      {{ browserRootPath || '/' }}
    </span>
    <button class="btn btn-sm btn-close btn-close-white ms-1" (click)="closeBrowser()"></button>
  </div>

  <!-- Legend bar -->
  <div class="browser-legend d-flex align-items-center gap-3 px-3 py-1 border-bottom bg-light small text-muted">
    <span><i class="bi bi-pin-fill text-primary me-1"></i>Active Root</span>
    <span><i class="bi bi-file-earmark-check text-success me-1"></i>Click file to select</span>
    <span class="ms-auto text-muted fst-italic" style="font-size:0.68rem;">Click folder to open &nbsp;·&nbsp; <i class="bi bi-pin me-1"></i>to set root</span>
  </div>

  <!-- Loading -->
  <div *ngIf="browserLoading" class="text-center py-5 text-muted">
    <div class="spinner-border spinner-border-sm mb-2 text-primary" role="status"></div>
    <p class="small mb-0">Loading…</p>
  </div>

  <!-- Error -->
  <div *ngIf="!browserLoading && browserError"
       class="alert alert-warning m-3 py-2 small">
    <i class="bi bi-exclamation-triangle me-1"></i>{{ browserError }}
  </div>

  <!-- ── CDK File Tree ─────────────────────────────────────────────────────── -->
  <div *ngIf="!browserLoading && !browserError" class="explorer-body">

    <div *ngIf="flatNodes.length === 0" class="text-center text-muted py-4 small">
      <i class="bi bi-folder-x d-block fs-4 mb-2 opacity-50"></i>
      Empty folder
    </div>

    <cdk-tree *ngIf="flatNodes.length > 0"
              [dataSource]="nodesData$"
              [treeControl]="treeControl">

      <!-- ── LEAF: File ────────────────────────────────────────────────────── -->
      <cdk-tree-node *cdkTreeNodeDef="let node"
                     class="tree-node tree-node-file"
                     [class.is-selected]="selectedNode === node"
                     [class.in-context-file]="node.inContext"
                     [style.padding-left.px]="node.level * 18 + 32"
                     (click)="selectFile(node)">
        <i class="node-icon"
           [class.bi-file-earmark-code]="isCodeFile(node.name)"
           [class.bi-file-earmark-text]="!isCodeFile(node.name)"
           [class.bi]="true"
           [class.text-info]="isCodeFile(node.name)"
           [class.text-muted]="!isCodeFile(node.name)"></i>
        <span class="node-label small text-truncate flex-1" [title]="node.path">{{ node.name }}</span>
        <label class="ctx-label ms-1" title="Include in AI Context" (click)="$event.stopPropagation()">
          <input type="checkbox"
                 class="form-check-input ctx-check"
                 [checked]="node.inContext"
                 (change)="toggleContext($event, node)">
        </label>
      </cdk-tree-node>

      <!-- ── BRANCH: Directory ─────────────────────────────────────────────── -->
      <cdk-tree-node *cdkTreeNodeDef="let node; when: hasChild"
                     class="tree-node tree-node-dir"
                     [class.is-active-root]="node.path === activePath"
                     [style.padding-left.px]="node.level * 18 + 4">

        <!-- Expand / Collapse toggle -->
        <button class="btn-expand"
                (click)="toggleNode(node)"
                [disabled]="node.loading"
                [title]="isExpanded(node) ? 'Collapse' : 'Expand'">
          <span *ngIf="node.loading"
                class="spinner-border spinner-border-sm text-primary"
                role="status"
                style="width:12px;height:12px;"></span>
          <i *ngIf="!node.loading"
             class="bi bi-chevron-right expand-icon"
             [class.expanded]="isExpanded(node)"></i>
        </button>

        <!-- Folder icon changes when open -->
        <i class="node-icon text-warning"
           [class.bi-folder-fill]="!isExpanded(node)"
           [class.bi-folder2-open]="isExpanded(node)"></i>

        <!-- Clickable label → navigate inside the folder -->
        <span class="node-label small text-truncate flex-1 dir-label"
              [title]="'Open: ' + node.path"
              (click)="navigateInto(node)">{{ node.name }}</span>

        <!-- Pin button: sets this folder as active workspace root -->
        <button class="btn-pin"
                (click)="$event.stopPropagation(); setAsRoot(node)"
                [title]="node.path === activePath ? 'Active workspace root' : 'Set as workspace root'">
          <i class="bi active-root-icon"
             [class.bi-pin-fill]="node.path === activePath"
             [class.text-primary]="node.path === activePath"
             [class.bi-pin]="node.path !== activePath"
             [class.text-muted]="node.path !== activePath"></i>
        </button>

        <!-- Include in AI Context checkbox -->
        <label class="ctx-label ms-1" title="Include in AI Context">
          <input type="checkbox"
                 class="form-check-input ctx-check"
                 [checked]="node.inContext"
                 (click)="toggleContext($event, node)">
        </label>

      </cdk-tree-node>

    </cdk-tree>
  </div>

  <!-- Footer -->
  <div class="browser-footer border-top px-3 py-2 bg-light d-flex align-items-center small text-muted">

    <!-- Selected file info strip -->
    <ng-container *ngIf="selectedNode; else defaultFooter">
      <i class="bi bi-file-earmark text-primary me-2 flex-shrink-0"></i>
      <span class="font-monospace text-truncate flex-1 me-2"
            [title]="selectedNode.path"
            style="font-size:0.72rem;">{{ selectedNode.path }}</span>
      <div class="d-flex gap-1 flex-shrink-0">
        <button class="btn btn-sm py-0 px-2"
                [class.btn-success]="selectedNode.inContext"
                [class.btn-outline-success]="!selectedNode.inContext"
                (click)="toggleContext($any($event), selectedNode)"
                title="Toggle AI context for this file">
          <i class="bi me-1"
             [class.bi-check2-square]="selectedNode.inContext"
             [class.bi-square]="!selectedNode.inContext"></i>{{ selectedNode.inContext ? 'In Context' : 'Add to Context' }}
        </button>
        <button class="btn btn-sm btn-outline-secondary py-0 px-2"
                (click)="clearSelection()"
                title="Clear selection">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </ng-container>

    <!-- Default footer -->
    <ng-template #defaultFooter>
      <span class="flex-1">{{ flatNodes.length }} item(s) visible</span>
      <button *ngIf="(workspaceService.contextFiles$ | async)?.length"
              class="btn btn-sm btn-outline-danger py-0 px-2 me-2"
              (click)="resetContext()"
              title="Clear all context file selections">
        <i class="bi bi-x-circle me-1"></i>Reset Context
      </button>
      <button class="btn btn-sm btn-outline-secondary py-0" (click)="closeBrowser()">Close</button>
    </ng-template>

  </div>

</div>
